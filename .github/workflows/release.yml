name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need history so we can find the previous tag

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build:plugin

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Validate the tag matches a semver-like pattern before using it in
          # shell/awk constructs. Defensive — git tag names already restrict
          # most metacharacters, but we never want unexpected input here.
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            echo "Tag '$VERSION' is not semver-like; writing placeholder body"
            printf 'Release %s\n' "$VERSION" > release_notes.md
            exit 0
          fi

          # Extract the "## <version>" section from CHANGELOG.md
          : > release_notes.md
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## " ver "[[:space:]]*$" { capture=1; next }
              capture && /^## / { exit }
              capture { print }
            ' CHANGELOG.md > release_notes.md
          fi

          # Drop trailing blank lines so we can detect "nothing was extracted"
          sed -i.bak -e :a -e '/^$/{$d;N;ba' -e '}' release_notes.md && rm -f release_notes.md.bak

          if [ ! -s release_notes.md ]; then
            printf 'Release %s\n' "$VERSION" > release_notes.md
          fi

          PREV=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          if printf '%s' "$PREV" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
              "$REPO" "$PREV" "$VERSION" >> release_notes.md
          fi

          echo "--- Generated release notes ---"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          files: |
            main.js
            manifest.json
            styles.css
